spring:
  application:
    name: private-data-guardian

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3      # The "Brain" for summarizing
          temperature: 0.7   # Creativity level (0.7 is good for summaries)
      embedding:
        options:
          model: mxbai-embed-large  # High-quality local embeddings

  mongodb:
    uri: mongodb://localhost:27017/guardian_db

# This allows n8n to send large files/text if needed
server:
  port: 8080
  servlet:
    context-path: /api